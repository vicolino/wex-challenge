# ---------------------------------------------------------------------------
# Common configuration shared by every profile.
#
# Datasource specifics live in the per-profile files:
#   application-local.yml   H2, file-backed (zero external deps; default)
#   application-dev.yml     PostgreSQL (dev environment)
#   application-hom.yml     PostgreSQL (homologation)
#   application-prod.yml    PostgreSQL (production)
#
# The active profile defaults to `local` so a fresh clone runs with no setup;
# override with SPRING_PROFILES_ACTIVE=dev|hom|prod (or -Dspring.profiles.active).
# ---------------------------------------------------------------------------
spring:
  application:
    name: wex-challenge
  profiles:
    default: local
  jpa:
    hibernate:
      # Schema is owned by Flyway. Hibernate only validates that the mapping
      # matches the migrated schema — it never issues DDL.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    cache-names: treasuryRates
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=24h,recordStats

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, caches, circuitbreakers, retries
  endpoint:
    health:
      show-details: when_authorized
  health:
    circuitbreakers.enabled: true

# Treasury Reporting Rates of Exchange API
treasury:
  base-url: https://api.fiscaldata.treasury.gov
  # Connect/read timeouts in milliseconds
  connect-timeout-ms: 5000
  read-timeout-ms: 10000
  # Look-back window per spec: 6 months
  lookback-months: 6

# Resilience4j: bulkhead the Treasury client so transient upstream failures don't
# cascade into our 422/502 user-facing errors, and so we stop hammering when it
# is clearly down.
resilience4j:
  retry:
    instances:
      treasury:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  circuitbreaker:
    instances:
      treasury:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
