# Local profile (default): file-backed H2 in PostgreSQL-compatibility mode.
#
# The database file lives under ./data and is gitignored, so data survives
# restarts but never gets committed. H2 in PostgreSQL mode means the same
# Flyway migration that runs against real PostgreSQL also runs here.
spring:
  datasource:
    url: jdbc:h2:file:./data/wex;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
